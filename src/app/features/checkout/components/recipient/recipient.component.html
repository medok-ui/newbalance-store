<form [formGroup]="from" class="checkout__form">
  <div class="checkout-section">
    <h2 class="checkout-section__title">Получатель</h2>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-group__label form-group__label--required" for="name">Имя</label>
        <input
          formControlName="firstName"
          class="form-group__input"
          readonly
          placeholder="Иван"
          id="name"
          type="text"
        />
      </div>
      <div class="form-group">
        <label class="form-group__label form-group__label--required" for="lastName">Фамилия</label>
        <input
          formControlName="lastName"
          readonly
          class="form-group__input"
          placeholder="Иванов"
          id="lastName"
          type="text"
        />
      </div>
      <div class="form-group">
        <label class="form-group__label form-group__label--required" for="email">Email</label>
        <input
          formControlName="email"
          class="form-group__input"
          readonly
          placeholder="name@example.com"
          id="email"
          type="email"
        />
      </div>
      <div class="form-group">
        <label class="form-group__label form-group__label--required" for="phone">Телефон</label>
        <input
          formControlName="phone"
          class="form-group__input"
          readonly
          placeholder="+7 (999) 000-00-00"
          id="phone"
          type="text"
        />
      </div>
    </div>
  </div>
</form>
